[env]
TERM = "xterm-256color"

[general]
live_config_reload = true

[font]
size = 19

[font.normal]
family = "InconsolataGo Nerd Font Mono"
style = "Regular"

[font.bold]
style = "Bold"

[window]
blur = true
decorations = "Buttonless"
opacity = 0.95
option_as_alt = "Both"
padding = { x = 6, y = 6 }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "Off" }

[[keyboard.bindings]]
key = "Comma"
mods = "Command"

[keyboard.bindings.command]
args = ["-c", "open ~/.config/alacritty/alacritty.toml"]
program = "sh"
