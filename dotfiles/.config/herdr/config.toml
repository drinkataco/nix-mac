onboarding = false

[theme]
name = "rose-pine"
auto_switch = true
dark_name = "rose-pine"
light_name = "rose-pine-dawn"

[terminal]
new_cwd = "follow"

[ui]
hide_tab_bar_when_single_tab = true

[ui.toast]
delivery = "herdr"

[experimental]
pane_history = true

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "lazygit"
