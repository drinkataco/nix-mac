[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/osh/projects/nix-mac"]

[mcp_servers.chrome_devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.argocd]
command = "npx"
args = ["-y", "argocd-mcp@latest", "stdio"]
env_vars = ["ARGOCD_BASE_URL", "ARGOCD_API_TOKEN"]

[mcp_servers.kubernetes]
command = "npx"
args = ["-y", "mcp-server-kubernetes@latest"]
env_vars = ["KUBECONFIG", "KUBE_CONTEXT"]

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "/Users/osh/projects/nix-mac"]
