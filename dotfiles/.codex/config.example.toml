# Example MCP servers often used with global MCP settings
# These are often copied globally on my machine and used as default MCP servers
[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/osh/projects/nix-mac"]

[mcp_servers.chrome_devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.fetch]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", "/Users/osh/projects/nix-mac"]

# Project/stack specific MCP servers
# These are usually used on an application level basis
[mcp_servers.argocd]
command = "npx"
args = ["-y", "argocd-mcp@latest", "stdio"]
env_vars = ["ARGOCD_BASE_URL", "ARGOCD_API_TOKEN"]

[mcp_servers.kubernetes]
command = "npx"
args = ["-y", "mcp-server-kubernetes@latest"]
env_vars = ["KUBECONFIG", "KUBE_CONTEXT"]


# Hosted HTTP MCP servers use a URL instead of a local command.
# For Notion, add the server and then complete auth separately with:
#   codex mcp login notion
#
[mcp_servers.datadog]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"
