name: Lint

on:
  pull_request:
  push:

jobs:
  bash:
    name: Bash
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: >-
            .github/workflows/scripts/lint-nix.sh
            .github/workflows/scripts/lint-tmux.sh
            .github/workflows/scripts/lint-zsh.sh

  lua:
    name: Lua
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run StyLua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check dotfiles/.config/nvim

  zsh:
    name: Zsh
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zsh
        run: |
          sudo apt-get update
          sudo apt-get install --yes zsh

      - name: Check Zsh syntax
        run: bash .github/workflows/scripts/lint-zsh.sh

  tmux:
    name: tmux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install --yes tmux

      - name: Check tmux config syntax
        run: bash .github/workflows/scripts/lint-tmux.sh

  nix:
    name: Nix
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run nixfmt
        run: bash .github/workflows/scripts/lint-nix.sh
